name: Test Login Incorrect (Expected Fail)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Run testLoginIncorrectFail
      run: mvn -B clean test -Dtest=LoginTest#testLoginIncorrectFail -Dheadless=true
      continue-on-error: true

    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports-incorrect-fail
        path: target/surefire-reports/

    - name: Publish Test Report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Login Incorrect (Expected Fail)
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: false